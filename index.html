                        <textarea class="w-full bg-gray-50 border border-gray-200 rounded-lg p-4 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition-colors min-h-[120px] text-gray-700" placeholder="ทดลองพิมพ์คำตอบหรือแนวคิดของคุณที่นี่..."></textarea>
                    </div>
                    <button onclick="toggleSolution(${q.id})" id="btn-sol-${q.id}" class="mt-4 bg-gray-800 hover:bg-gray-700 text-white font-medium py-2.5 px-5 rounded-lg transition-colors flex items-center gap-2 shadow-sm">
                        <i data-lucide="eye" class="w-4 h-4"></i> ดูเฉลยและเหตุผล
                    </button>
                    
                    <div id="solution-${q.id}" class="explanation-enter rounded-lg p-5 bg-green-50 border border-green-200 mt-4 hidden">
                        <h4 class="font-bold text-green-800 flex items-center gap-2 mb-3 pb-2 border-b border-green-200">
                            <i data-lucide="check-circle" class="w-5 h-5"></i> แนวคำตอบที่ถูกต้อง
                        </h4>
                        <div class="text-gray-800 leading-relaxed">
                            ${q.solution}
                        </div>
                    </div>
                </div>
            `;
        }

        // ฟังก์ชันสร้าง UI ทั้งหมด
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            
            const mcqs = quizData.filter(q => q.type === 'mcq');
            const codingWrittens = quizData.filter(q => q.type === 'written' && q.section === 'coding');
            const projectWrittensGroup1 = quizData.filter(q => q.section === 'jira_trello' && q.group === 1);
            const projectWrittensGroup2 = quizData.filter(q => q.section === 'jira_trello' && q.group === 2);

            let html = ``;

            // =====================================
            // ส่วนที่ 1: ปรนัย
            // =====================================
            html += `
                <div class="mb-6 mt-4 flex items-center gap-3">
                    <div class="w-2 h-8 bg-blue-500 rounded-full"></div>
                    <h2 class="text-2xl font-bold text-gray-800">ส่วนที่ 1: ปรนัย (Multiple Choice)</h2>
                </div>`;
            
            mcqs.forEach(q => {
                let optionsHtml = '';
                for (const [key, value] of Object.entries(q.options)) {
                    optionsHtml += `
                        <label class="flex items-start gap-3 p-3.5 rounded-lg border border-gray-200 hover:bg-blue-50 hover:border-blue-200 cursor-pointer transition-all option-label-${q.id}" id="label-${q.id}-${key}">
                            <input type="radio" name="question-${q.id}" value="${key}" class="mt-1.5 w-4 h-4 text-blue-600 focus:ring-blue-500" onchange="checkAnswer(${q.id}, '${key}')">
                            <span class="text-gray-700 leading-relaxed"><span class="font-semibold uppercase text-blue-800 mr-2">${key}.</span> ${value}</span>
                        </label>
                    `;
                }
                html += `
                    <div class="bg-white rounded-xl shadow-md p-6 mb-6 border border-gray-100" id="card-${q.id}">
                        <h3 class="font-semibold text-lg text-gray-800 mb-5 leading-relaxed">${q.question}</h3>
                        <div class="flex flex-col gap-3">
                            ${optionsHtml}
                        </div>
                        <div id="feedback-${q.id}" class="explanation-enter rounded-lg p-5 bg-blue-50 border border-blue-100 hidden mt-5"></div>
                    </div>
                `;
            });

            // =====================================
            // ส่วนที่ 2: อัตนัย - โค้ดดิ้ง
            // =====================================
            html += `
                <div class="mb-6 mt-12 flex items-center gap-3">
                    <div class="w-2 h-8 bg-purple-500 rounded-full"></div>
                    <h2 class="text-2xl font-bold text-gray-800">ส่วนที่ 2: อัตนัย - การเขียนโค้ด (SOLID & Refactoring)</h2>
                </div>`;
            
            codingWrittens.forEach(q => {
                html += createWrittenQuestionHTML(q);
            });

            // =====================================
            // ส่วนที่ 3: อัตนัย - Jira & Trello
            // =====================================
            html += `
                <div class="mb-6 mt-12 flex items-center gap-3">
                    <div class="w-2 h-8 bg-orange-500 rounded-full"></div>
                    <h2 class="text-2xl font-bold text-gray-800">ส่วนที่ 3: อัตนัย - Project Management (Jira & Trello)</h2>
                </div>`;
            
            // --- รูปที่ 1 สำหรับข้อ 1-5 ---
            html += `
                <div class="bg-white rounded-xl shadow-md p-6 mb-8 border border-gray-100">
                    <img src="1to5.png" alt="ภาพ Jira Board สำหรับใช้ประกอบการตอบคำถามอัตนัยข้อ 1 ถึงข้อ 5" class="w-full h-auto rounded-lg shadow-sm">
                    <p class="text-sm text-gray-600 text-center mt-4">ภาพ Jira Board สำหรับใช้ประกอบการตอบคำถามอัตนัยข้อ 1 ถึงข้อ 5</p>
                </div>
            `;
            projectWrittensGroup1.forEach(q => { html += createWrittenQuestionHTML(q); });

            // --- รูปที่ 2 สำหรับข้อ 6-10 ---
            html += `
                <div class="bg-white rounded-xl shadow-md p-6 mb-8 mt-12 border border-gray-100">
                    <img src="6to10.png" alt="ภาพขั้นตอนการ Migrate ระบบจาก Jira สู่ Trello สำหรับใช้ประกอบการตอบคำถามอัตนัยข้อ 6 ถึงข้อ 10" class="w-full h-auto rounded-lg shadow-sm">
                    <p class="text-sm text-gray-600 text-center mt-4">ภาพขั้นตอนการ Migrate ระบบจาก Jira สู่ Trello สำหรับใช้ประกอบการตอบคำถามอัตนัยข้อ 6 ถึงข้อ 10</p>
                </div>
            `;
            projectWrittensGroup2.forEach(q => { html += createWrittenQuestionHTML(q); });


            container.innerHTML = html;
            lucide.createIcons();
        }

        // ตรวจคำตอบปรนัย
        window.checkAnswer = function(questionId, selectedKey) {
            const question = quizData.find(q => q.id === questionId);
            const isCorrect = selectedKey === question.correct;
            
            // ล็อกตัวเลือกทั้งหมดของข้อนั้น
            const inputs = document.querySelectorAll(`input[name="question-${questionId}"]`);
            inputs.forEach(input => input.disabled = true);

            // เอาสไตล์ hover ออก
            const labels = document.querySelectorAll(`.option-label-${questionId}`);
            labels.forEach(label => {
                label.classList.remove('hover:bg-blue-50', 'hover:border-blue-200', 'cursor-pointer');
                label.classList.add('opacity-60', 'cursor-not-allowed', 'bg-gray-50');
            });

            // ใส่สีให้ตัวที่เลือกและตัวที่ถูก
            const selectedLabel = document.getElementById(`label-${questionId}-${selectedKey}`);
            const correctLabel = document.getElementById(`label-${questionId}-${question.correct}`);
            
            selectedLabel.classList.remove('opacity-60', 'bg-gray-50');
            correctLabel.classList.remove('opacity-60', 'bg-gray-50');

            if (isCorrect) {
                selectedLabel.classList.add('bg-green-100', 'border-green-500', 'shadow-sm');
                selectedLabel.innerHTML += `<i data-lucide="check" class="text-green-600 ml-auto w-6 h-6"></i>`;
            } else {
                selectedLabel.classList.add('bg-red-100', 'border-red-400');
                selectedLabel.innerHTML += `<i data-lucide="x" class="text-red-600 ml-auto w-6 h-6"></i>`;
                
                correctLabel.classList.add('bg-green-50', 'border-green-400', 'shadow-sm');
                correctLabel.innerHTML += `<i data-lucide="check" class="text-green-600 ml-auto w-6 h-6"></i>`;
            }

            // แสดงคำอธิบาย
            const feedbackDiv = document.getElementById(`feedback-${questionId}`);
            const feedbackTitle = isCorrect 
                ? `<span class="text-green-700 font-bold flex items-center gap-2 text-lg"><i data-lucide="check-circle" class="w-6 h-6"></i> ยอดเยี่ยม! ตอบถูกต้อง</span>` 
                : `<span class="text-red-700 font-bold flex items-center gap-2 text-lg"><i data-lucide="x-circle" class="w-6 h-6"></i> ตอบผิดครับ คำตอบที่ถูกต้องคือข้อ ${question.correct.toUpperCase()}</span>`;
            
            feedbackDiv.innerHTML = `
                <div class="mb-3 pb-2 border-b border-blue-200/50">${feedbackTitle}</div>
                <div class="text-gray-800 leading-relaxed"><strong class="text-blue-900">เหตุผลประกอบ:</strong> ${question.explanation}</div>
            `;
            feedbackDiv.classList.remove('hidden');
            
            setTimeout(() => {
                feedbackDiv.classList.add('explanation-enter-active');
            }, 10);

            lucide.createIcons();
        };

        // แสดง/ซ่อน เฉลยอัตนัย
        window.toggleSolution = function(questionId) {
            const solutionDiv = document.getElementById(`solution-${questionId}`);
            const btn = document.getElementById(`btn-sol-${questionId}`);
            
            if (solutionDiv.classList.contains('hidden')) {
                solutionDiv.classList.remove('hidden');
                setTimeout(() => {
                    solutionDiv.classList.add('explanation-enter-active');
                }, 10);
                btn.innerHTML = `<i data-lucide="eye-off" class="w-4 h-4"></i> ซ่อนเฉลย`;
                btn.classList.replace('bg-gray-800', 'bg-gray-600');
            } else {
                solutionDiv.classList.remove('explanation-enter-active');
                setTimeout(() => {
                    solutionDiv.classList.add('hidden');
                }, 400);
                btn.innerHTML = `<i data-lucide="eye" class="w-4 h-4"></i> ดูเฉลยและเหตุผล`;
                btn.classList.replace('bg-gray-600', 'bg-gray-800');
            }
            lucide.createIcons();
        };

        // สั่งทำงานเมื่อโหลดหน้าเว็บเสร็จ
        document.addEventListener('DOMContentLoaded', renderQuiz);

    </script>
</body>
</html>
